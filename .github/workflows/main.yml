      - name: 🛡️ Configure SSH Server
        run: |
          export TERM=xterm
          
          # تمكين الجذر وكلمة المرور
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          
          # تعيين المنفذ
          echo "Port 2222" | sudo tee -a /etc/ssh/sshd_config
          echo "PermitEmptyPasswords no" | sudo tee -a /etc/ssh/sshd_config
          
          # إعادة تشغيل SSH
          sudo systemctl restart sshd || sudo service ssh restart || true
          
