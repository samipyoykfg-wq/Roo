name: 🔥 SSH Session Stable - Professional

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: '⏱️ مدة الجلسة (بالدقائق)'
        required: false
        default: '360'
        type: choice
        options:
          - '360'
          - '720'
          - '1440'
          - '2880'

jobs:
  ssh:
    name: 🔥 Professional SSH Session
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.session_duration || 360) }}

    steps:
      # =============================================
      # 1. شعار احترافي
      # =============================================
      - name: 🎨 Professional Banner
        run: |
          export TERM=xterm
          echo ""
          echo " ╔═══════════════════════════════════════════════════════════════════════════╗"
          echo " ║                                                                           ║"
          echo " ║    ███████╗███████╗██╗  ██╗    ███████╗███████╗███████╗██╗ ██████╗ ███╗   ██╗ ║"
          echo " ║    ██╔════╝██╔════╝██║  ██║    ██╔════╝██╔════╝██╔════╝██║██╔════╝ ████╗  ██║ ║"
          echo " ║    ███████╗███████╗███████║    ███████╗███████╗███████╗██║██║  ███╗██╔██╗ ██║ ║"
          echo " ║    ╚════██║╚════██║██╔══██║    ╚════██║╚════██║╚════██║██║██║   ██║██║╚██╗██║ ║"
          echo " ║    ███████║███████║██║  ██║    ███████║███████║███████║██║╚██████╔╝██║ ╚████║ ║"
          echo " ║    ╚══════╝╚══════╝╚═╝  ╚═╝    ╚══════╝╚══════╝╚══════╝╚═╝ ╚═════╝ ╚═╝  ╚═══╝ ║"
          echo " ║                                                                           ║"
          echo " ║                   🔥 PROFESSIONAL SSH SESSION 🔥                          ║"
          echo " ║                                                                           ║"
          echo " ║                      ⚡ ROOT ACCESS - UNLIMITED ⚡                         ║"
          echo " ║                                                                           ║"
          echo " ╚═══════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ╔═══════════════════════════════════════════════════════════════════════════╗"
          echo "  ║  🚀 System Status: ONLINE                                                 ║"
          echo "  ║  👑 Root Access: GRANTED                                                  ║"
          echo "  ║  ⏱️  Session Duration: ${{ fromJSON(inputs.session_duration || 360) }} minutes  ║"
          echo "  ║  🌐 Host: $(hostname)                                                     ║"
          echo "  ║  📅 Date: $(date '+%Y-%m-%d %H:%M:%S')                                    ║"
          echo "  ╚═══════════════════════════════════════════════════════════════════════════╝"
          echo ""

      # =============================================
      # 2. تثبيت tmate والأدوات الأساسية
      # =============================================
      - name: 📦 Install Dependencies
        run: |
          export TERM=xterm
          sudo apt update -y
          sudo apt install -y tmate htop neofetch
          echo "✅ Dependencies installed"

      # =============================================
      # 3. تشغيل tmate - دخول مباشر بدون كلمة مرور
      # =============================================
      - name: 🚀 Start tmate Session
        run: |
          export TERM=xterm
          
          # تشغيل tmate في الخلفية
          tmate -F > /tmp/tmate.log 2>&1 &
          
          # انتظار تهيئة tmate
          echo "⏳ Waiting for tmate to initialize..."
          sleep 15
          
          # استخراج رابط SSH
          SSH_CMD=$(grep -o 'ssh [a-zA-Z0-9]*@[a-zA-Z0-9.-]*\.tmate\.io' /tmp/tmate.log | head -1)
          
          # حفظ رابط SSH
          echo "$SSH_CMD" > /root/tmate_link.txt
          
          echo ""
          echo " ╔═══════════════════════════════════════════════════════════════════════════╗"
          echo " ║                         🔥 SESSION ACTIVE 🔥                             ║"
          echo " ╚═══════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ╔═══════════════════════════════════════════════════════════════════════════╗"
          echo "  ║  🔗 SSH CONNECTION (NO PASSWORD NEEDED):                                  ║"
          echo "  ║                                                                           ║"
          echo "  ║     $SSH_CMD                                                              ║"
          echo "  ║                                                                           ║"
          echo "  ║  📋 Available Commands:                                                   ║"
          echo "  ║     whoami      - Show current user                                       ║"
          echo "  ║     hostname    - Show hostname                                           ║"
          echo "  ║     uptime      - Show system uptime                                      ║"
          echo "  ║     free -h     - Show memory usage                                       ║"
          echo "  ║     df -h       - Show disk usage                                         ║"
          echo "  ║     htop        - System monitor                                          ║"
          echo "  ║     neofetch    - Show system info                                        ║"
          echo "  ║                                                                           ║"
          echo "  ║  ⏱️  Session Duration: ${{ fromJSON(inputs.session_duration || 360) }} minutes  ║"
          echo "  ╚═══════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # حفظ المعلومات
          cat > /root/SESSION_INFO.txt << EOF
          ========================================
          🔥 PROFESSIONAL SSH SESSION
          ========================================
          Date: $(date)
          Hostname: $(hostname)
          IP: $(hostname -I | awk '{print $1}')
          
          SSH Link (NO PASSWORD):
          $SSH_CMD
          
          Session Duration: ${{ fromJSON(inputs.session_duration || 360) }} minutes
          ========================================
          EOF
          
          echo "📄 Session info saved to /root/SESSION_INFO.txt"
          echo ""
          echo " 📝 Full tmate log:"
          cat /tmp/tmate.log
          echo ""

      # =============================================
      # 4. Keep Alive احترافي
      # =============================================
      - name: 🔄 Professional Keep Alive
        run: |
          export TERM=xterm
          
          SSH_CMD=$(cat /root/tmate_link.txt 2>/dev/null || echo "ssh link not found")
          
          echo " ╔═══════════════════════════════════════════════════════════════════════════╗"
          echo " ║                      🔄 MONITORING SESSION 🔄                            ║"
          echo " ╚═══════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          while true; do
            echo " ┌───────────────────────────────────────────────────────────────────────────┐"
            echo " │  🕐 $(date '+%Y-%m-%d %H:%M:%S')                                           │"
            echo " │  📊 Uptime: $(uptime -p)                                                   │"
            echo " │  👥 Users: $(who | wc -l) connected                                        │"
            echo " │  ⚡ Load: $(uptime | awk -F'load average:' '{print $2}' 2>/dev/null || echo 'N/A') │"
            echo " │  🖥️  Host: $(hostname)                                                    │"
            echo " │  🔗 SSH: $SSH_CMD                                                         │"
            echo " └───────────────────────────────────────────────────────────────────────────┘"
            echo ""
            sleep 300
          done          echo " ║                                                              ║"
          echo " ║   ███████╗███████╗██╗  ██╗    ███████╗████████╗ █████╗ ██████╗ ██╗     ║"
          echo " ║   ██╔════╝██╔════╝██║  ██║    ██╔════╝╚══██╔══╝██╔══██╗██╔══██╗██║     ║"
          echo " ║   ███████╗███████╗███████║    ███████╗   ██║   ███████║██████╔╝██║     ║"
          echo " ║   ╚════██║╚════██║██╔══██║    ╚════██║   ██║   ██╔══██║██╔══██╗██║     ║"
          echo " ║   ███████║███████║██║  ██║    ███████║   ██║   ██║  ██║██████╔╝███████╗║"
          echo " ║   ╚══════╝╚══════╝╚═╝  ╚═╝    ╚══════╝   ╚═╝   ╚═╝  ╚═╝╚═════╝ ╚══════╝║"
          echo " ║                                                              ║"
          echo " ║              🐉 ROOT SESSION - UNLIMITED POWER 🐉            ║"
          echo " ║                                                              ║"
          echo " ╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ⚡ > System initialized."
          echo "  ⚡ > Root access granted."
          echo "  ⚡ > All tools loaded."
          echo "  ⚡ > Session will stay alive for ${{ fromJSON(inputs.session_duration || 360) }} minutes."
          echo ""

      # =============================================
      # 2. تثبيت الاعتماديات الأساسية + tmate
      # =============================================
      - name: 📦 Install Dependencies
        run: |
          export TERM=xterm
          sudo apt update -y
          sudo apt install -y \
            curl wget git vim nano tmux screen \
            net-tools iputils-ping dnsutils \
            python3 python3-pip python3-venv \
            openssh-server sshpass \
            build-essential gcc g++ make \
            jq unzip zip tar \
            htop neofetch \
            tor proxychains4 nmap \
            nethogs iftop iotop \
            tmate
          echo "✅ Dependencies installed."

      # =============================================
      # 3. تثبيت أدوات الاختراق
      # =============================================
      - name: 🔧 Install Hacking Tools
        if: ${{ fromJSON(inputs.enable_tools || true) }}
        run: |
          export TERM=xterm
          echo "🔧 Installing penetration testing tools..."
          
          # Hydra
          sudo apt install -y hydra || true
          
          # John the Ripper
          sudo apt install -y john || true
          
          # Aircrack-ng
          sudo apt install -y aircrack-ng || true
          
          # Nikto
          sudo apt install -y nikto || true
          
          # Dirb
          sudo apt install -y dirb || true
          
          # Gobuster
          sudo apt install -y gobuster || true
          
          # FFUF
          sudo apt install -y ffuf || true
          
          # SQLMap
          git clone https://github.com/sqlmapproject/sqlmap.git /opt/sqlmap 2>/dev/null || true
          sudo ln -sf /opt/sqlmap/sqlmap.py /usr/local/bin/sqlmap 2>/dev/null || true
          
          # Paramiko (SSH)
          pip3 install paramiko pysocks requests colorama || true
          
          echo "✅ Hacking tools installed."

      # =============================================
      # 4. إعداد SSH Server
      # =============================================
      - name: 🛡️ Configure SSH Server
        run: |
          export TERM=xterm
          
          # تمكين الجذر وكلمة المرور
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          
          # إعادة تشغيل SSH
          sudo systemctl restart ssh || sudo service ssh restart || true
          
          echo "✅ SSH Server configured."

      # =============================================
      # 5. إنشاء المستخدمين
      # =============================================
      - name: 👤 Create Users
        run: |
          export TERM=xterm
          
          # تعيين كلمة مرور الجذر
          sudo chpasswd <<< "root:RootHack2026!"
          
          # إنشاء مستخدم admin
          sudo useradd -m -s /bin/bash admin 2>/dev/null || true
          sudo chpasswd <<< "admin:AdminHack2026!"
          sudo usermod -aG sudo admin 2>/dev/null || true
          
          # إنشاء مستخدم hacker
          sudo useradd -m -s /bin/bash hacker 2>/dev/null || true
          sudo chpasswd <<< "hacker:HackThePlanet2026!"
          sudo usermod -aG sudo hacker 2>/dev/null || true
          
          echo "✅ Users created: root, admin, hacker"

      # =============================================
      # 6. تثبيت Scripts إضافية
      # =============================================
      - name: 📜 Install Custom Scripts
        run: |
          export TERM=xterm
          
          # سكريبت معلومات النظام
          sudo tee /usr/local/bin/sysinfo > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "╔══════════════════════════════════════╗"
          echo "║         SYSTEM INFORMATION          ║"
          echo "╚══════════════════════════════════════╝"
          echo "🖥️ Hostname: $(hostname)"
          echo "🐧 OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"' 2>/dev/null || echo 'Linux')"
          echo "💻 Kernel: $(uname -r)"
          echo "🧠 CPU: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs 2>/dev/null || echo 'Unknown')"
          echo "⚡ Cores: $(nproc)"
          echo "📀 RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "💾 Disk: $(df -h / | awk 'NR==2 {print $2}')"
          echo "🌐 IP: $(hostname -I | awk '{print $1}')"
          echo "📅 Uptime: $(uptime -p)"
          EOF
          sudo chmod +x /usr/local/bin/sysinfo
          
          # سكريبت الاختراق السريع
          sudo tee /usr/local/bin/quickhack > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "🔍 Quick Hack Menu:"
          echo "1 - Port Scan (nmap)"
          echo "2 - SSH Bruteforce (hydra)"
          echo "3 - SQL Injection (sqlmap)"
          echo "4 - Directory Bruteforce (gobuster)"
          echo "5 - Show System Info"
          echo ""
          read -p "🔢 Choose option: " opt
          case $opt in
            1) read -p "Target: " t; nmap -sV -sC -T4 $t ;;
            2) read -p "Target IP: " ip; read -p "Username: " u; hydra -l $u -P /usr/share/wordlists/fasttrack.txt $ip ssh 2>/dev/null || echo "Try: hydra -l $u -P /usr/share/wordlists/rockyou.txt $ip ssh" ;;
            3) read -p "URL: " url; sqlmap -u $url --batch ;;
            4) read -p "URL: " url; gobuster dir -u $url -w /usr/share/wordlists/dirb/common.txt ;;
            5) sysinfo ;;
            *) echo "Invalid option" ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/quickhack
          
          # سكريبت إدارة المستخدمين
          sudo tee /usr/local/bin/adminmenu > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "👑 ADMIN MENU - Root Power"
          echo "1 - List all users"
          echo "2 - Add new user"
          echo "3 - Delete user"
          echo "4 - Reset password"
          echo "5 - View logged in users"
          echo "6 - System update"
          echo "7 - Exit"
          read -p "Choose: " opt
          case $opt in
            1) cut -d: -f1 /etc/passwd ;;
            2) read -p "Username: " u; useradd -m -s /bin/bash $u; passwd $u ;;
            3) read -p "Username: " u; userdel -r $u ;;
            4) read -p "Username: " u; passwd $u ;;
            5) who ;;
            6) sudo apt update && sudo apt upgrade -y ;;
            7) exit ;;
            *) echo "Invalid option" ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/adminmenu
          
          # سكريبت عرض رابط tmate
          sudo tee /usr/local/bin/tmate-link > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          if [ -f /root/tmate_link.txt ]; then
            echo "🔗 SSH Link:"
            cat /root/tmate_link.txt
          else
            echo "⚠️ tmate link not found. Check /tmp/tmate.log"
          fi
          EOF
          sudo chmod +x /usr/local/bin/tmate-link
          
          echo "✅ Custom scripts installed."

      # =============================================
      # 7. تشغيل tmate
      # =============================================
      - name: 🚀 Start tmate Session
        run: |
          export TERM=xterm
          
          # تشغيل tmate في الخلفية
          tmate -F > /tmp/tmate.log 2>&1 &
          
          # انتظار تهيئة tmate
          echo "⏳ Waiting for tmate to initialize..."
          sleep 15
          
          # استخراج رابط SSH
          SSH_CMD=$(grep -o 'ssh [a-zA-Z0-9]*@[a-zA-Z0-9.-]*\.tmate\.io' /tmp/tmate.log | head -1)
          
          # حفظ رابط SSH
          echo "$SSH_CMD" > /root/tmate_link.txt
          
          echo ""
          echo " ╔══════════════════════════════════════════════════════════════╗"
          echo " ║                 🐉 SESSION ACTIVE 🐉                        ║"
          echo " ╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  🔗 SSH CONNECTION (NO PASSWORD NEEDED):"
          echo "  $SSH_CMD"
          echo ""
          echo "  🔑 PASSWORDS (if needed):"
          echo "     root: RootHack2026!"
          echo "     admin: AdminHack2026!"
          echo "     hacker: HackThePlanet2026!"
          echo ""
          echo "  📋 Available Commands:"
          echo "     sysinfo      - Show system information"
          echo "     quickhack    - Quick hacking menu"
          echo "     adminmenu    - Admin management menu"
          echo "     tmate-link   - Show tmate SSH link"
          echo ""
          echo "  📂 Tools Location:"
          echo "     /opt/sqlmap/    - SQLMap"
          echo ""
          echo "  ⏳ Session will stay alive for ${{ fromJSON(inputs.session_duration || 360) }} minutes."
          echo ""

      # =============================================
      # 8. Keep Alive
      # =============================================
      - name: 🔄 Keep Alive
        run: |
          export TERM=xterm
          
          SSH_CMD=$(cat /root/tmate_link.txt 2>/dev/null || echo "ssh link not found")
          
          while true; do
            echo "🔄 Session active - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "   Uptime: $(uptime -p)"
            echo "   Users: $(who | wc -l) connected"
            echo "   Load: $(uptime | awk -F'load average:' '{print $2}' 2>/dev/null || echo 'N/A')"
            echo ""
            echo "   🔗 SSH: $SSH_CMD"
            echo ""
            sleep 300
          done          echo " ║                                                              ║"
          echo " ║   ███████╗███████╗██╗  ██╗    ███████╗████████╗ █████╗ ██████╗ ██╗     ║"
          echo " ║   ██╔════╝██╔════╝██║  ██║    ██╔════╝╚══██╔══╝██╔══██╗██╔══██╗██║     ║"
          echo " ║   ███████╗███████╗███████║    ███████╗   ██║   ███████║██████╔╝██║     ║"
          echo " ║   ╚════██║╚════██║██╔══██║    ╚════██║   ██║   ██╔══██║██╔══██╗██║     ║"
          echo " ║   ███████║███████║██║  ██║    ███████║   ██║   ██║  ██║██████╔╝███████╗║"
          echo " ║   ╚══════╝╚══════╝╚═╝  ╚═╝    ╚══════╝   ╚═╝   ╚═╝  ╚═╝╚═════╝ ╚══════╝║"
          echo " ║                                                              ║"
          echo " ║              🐉 ROOT SESSION - UNLIMITED POWER 🐉            ║"
          echo " ║                                                              ║"
          echo " ╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ⚡ > System initialized."
          echo "  ⚡ > Root access granted."
          echo "  ⚡ > All tools loaded."
          echo "  ⚡ > Session will stay alive for ${{ fromJSON(inputs.session_duration || 360) }} minutes."
          echo ""

      # =============================================
      # 2. تثبيت الاعتماديات الأساسية
      # =============================================
      - name: 📦 Install Base Dependencies
        run: |
          export TERM=xterm
          sudo apt update -y
          sudo apt install -y \
            curl wget git vim nano tmux screen \
            net-tools iputils-ping dnsutils \
            python3 python3-pip python3-venv \
            openssh-server sshpass \
            build-essential gcc g++ make \
            jq unzip zip tar \
            htop neofetch \
            tor proxychains4 nmap \
            nethogs iftop iotop \
            tmate

      # =============================================
      # 3. تثبيت أدوات الاختراق
      # =============================================
      - name: 🔧 Install Hacking Tools
        if: ${{ fromJSON(inputs.enable_tools || true) }}
        run: |
          export TERM=xterm
          echo "🔧 Installing penetration testing tools..."
          
          sudo apt install -y hydra john aircrack-ng nikto dirb gobuster ffuf || true
          
          git clone https://github.com/sqlmapproject/sqlmap.git /opt/sqlmap 2>/dev/null || true
          sudo ln -sf /opt/sqlmap/sqlmap.py /usr/local/bin/sqlmap 2>/dev/null || true
          
          pip3 install paramiko pysocks requests colorama || true
          
          echo "✅ Hacking tools installed."

      # =============================================
      # 4. تثبيت Scripts إضافية
      # =============================================
      - name: 📜 Install Custom Scripts
        run: |
          export TERM=xterm
          
          # سكريبت معلومات النظام
          sudo tee /usr/local/bin/sysinfo > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "╔══════════════════════════════════════╗"
          echo "║         SYSTEM INFORMATION          ║"
          echo "╚══════════════════════════════════════╝"
          echo "🖥️ Hostname: $(hostname)"
          echo "🐧 OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"' 2>/dev/null || echo 'Linux')"
          echo "💻 Kernel: $(uname -r)"
          echo "🧠 CPU: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs 2>/dev/null || echo 'Unknown')"
          echo "⚡ Cores: $(nproc)"
          echo "📀 RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "💾 Disk: $(df -h / | awk 'NR==2 {print $2}')"
          echo "🌐 IP: $(hostname -I | awk '{print $1}')"
          echo "📅 Uptime: $(uptime -p)"
          EOF
          sudo chmod +x /usr/local/bin/sysinfo
          
          # سكريبت الاختراق السريع
          sudo tee /usr/local/bin/quickhack > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "🔍 Quick Hack Menu:"
          echo "1 - Port Scan (nmap)"
          echo "2 - SSH Bruteforce (hydra)"
          echo "3 - SQL Injection (sqlmap)"
          echo "4 - Directory Bruteforce (gobuster)"
          echo "5 - Show System Info"
          echo ""
          read -p "🔢 Choose option: " opt
          case $opt in
            1) read -p "Target: " t; nmap -sV -sC -T4 $t ;;
            2) read -p "Target IP: " ip; read -p "Username: " u; hydra -l $u -P /usr/share/wordlists/fasttrack.txt $ip ssh 2>/dev/null || echo "Try: hydra -l $u -P /usr/share/wordlists/rockyou.txt $ip ssh" ;;
            3) read -p "URL: " url; sqlmap -u $url --batch ;;
            4) read -p "URL: " url; gobuster dir -u $url -w /usr/share/wordlists/dirb/common.txt ;;
            5) sysinfo ;;
            *) echo "Invalid option" ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/quickhack
          
          # سكريبت إدارة المستخدمين
          sudo tee /usr/local/bin/adminmenu > /dev/null << 'EOF'
          #!/bin/bash
          export TERM=xterm
          echo "👑 ADMIN MENU - Root Power"
